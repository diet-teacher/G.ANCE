<!-- 후기·전후 섹션 -->
<section style="background: #fff; padding: 48px 24px;">
  <p style="font-size: 12px; letter-spacing: 2px; color: #C9908A; text-align: center; margin: 0 0 12px; text-transform: uppercase;">REVIEW</p>
  <h2 style="font-size: 20px; font-weight: 700; color: #2E2220; text-align: center; margin: 0 0 8px; line-height: 1.5;">고객 후기</h2>
  <p style="font-size: 12px; color: #A0706A; text-align: center; margin: 0 0 28px;">* 결과는 개인에 따라 다를 수 있습니다</p>

  <!-- 전후 사진 (사진이 있을 때) -->
  <div style="display: flex; gap: 8px; margin-bottom: 28px;">
    <div style="flex: 1; background: #F2E8E5; border-radius: 8px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 4px;">
      <p style="font-size: 11px; color: #A0706A; margin: 0; font-weight: 600;">BEFORE</p>
      <p style="font-size: 11px; color: #A0706A; margin: 0;">사진을 넣어주세요</p>
    </div>
    <div style="flex: 1; background: #FAF5F3; border-radius: 8px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 4px;">
      <p style="font-size: 11px; color: #C9908A; margin: 0; font-weight: 600;">AFTER</p>
      <p style="font-size: 11px; color: #C9908A; margin: 0;">사진을 넣어주세요</p>
    </div>
  </div>

  <!-- 후기 카드들 (동의받은 실제 후기만) -->
  <div style="display: flex; flex-direction: column; gap: 16px;">
    <div style="background: #FAF5F3; border-radius: 12px; padding: 20px;">
      <div style="display: flex; gap: 4px; margin-bottom: 10px;">
        <span style="color: #C9908A; font-size: 14px;">★★★★★</span>
      </div>
      <p style="font-size: 14px; color: #2E2220; margin: 0 0 10px; line-height: 1.7;">{{실제 고객 후기 내용 — 동의 받은 것만}}</p>
      <p style="font-size: 12px; color: #A0706A; margin: 0;">— {{고객 닉네임 또는 익명}}</p>
    </div>
    <div style="background: #FAF5F3; border-radius: 12px; padding: 20px;">
      <div style="display: flex; gap: 4px; margin-bottom: 10px;">
        <span style="color: #C9908A; font-size: 14px;">★★★★★</span>
      </div>
      <p style="font-size: 14px; color: #2E2220; margin: 0 0 10px; line-height: 1.7;">{{실제 고객 후기 내용 — 동의 받은 것만}}</p>
      <p style="font-size: 12px; color: #A0706A; margin: 0;">— {{고객 닉네임 또는 익명}}</p>
    </div>
  </div>
</section>
